<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 16px;
      background: #0f172a;
      color: white;
      font-family: sans-serif;
    }
    h2 { margin: 0 0 12px; font-size: 18px; color: #5eead4; }
    .status { font-size: 14px; margin-bottom: 16px; color: #94a3b8; }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: #0d9488;
      color: white;
      text-align: center;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }
    .btn:hover { background: #0891b2; }
    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 12px;
      background: #1e293b;
      border: 1px solid #334155;
      color: white;
      border-radius: 4px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <h2>Sentira Wellness</h2>
  <div id="auth-section">
    <p class="status">Connect your account</p>
    <input type="text" id="api-token" placeholder="Paste your API token here">
    <button class="btn" id="save-token">Connect</button>
  </div>
  <div id="main-section" style="display:none">
    <p class="status">Successfully connected!</p>
    <button class="btn" id="open-dashboard">Go to Dashboard</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
